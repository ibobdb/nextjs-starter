
services:
  app:
    image: ${DOCKERHUB_USERNAME:-yourusername}/dbstudio-app:${IMAGE_TAG:-latest}
    container_name: dbstudio-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8888}:${PORT:-8888}"
    env_file:
      - .env
    environment:
      - TZ=Asia/Jakarta
      - NODE_ENV=production
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - caddy_network

networks:
  caddy_network:
    external: true
