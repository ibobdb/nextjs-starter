version: '3.8'

services:
  app:
    # Nama image disesuaikan dengan workflow GitHub Actions
    image: ${DOCKERHUB_USERNAME:-yourusername}/dbstudio-app:${IMAGE_TAG:-latest}
    container_name: dbstudio-app
    restart: always
    ports:
      - "3000:3000"
    # Membaca variabel dari file .env di level direktori VPS (bukan di repository)
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
